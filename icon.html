<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Hours Icons</title>
    <style>
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .icon-item {
            text-align: center;
        }
        .icon-item img {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="icon-grid">
        <div class="icon-item">
            <img src="/icons/icon-72x72.png" alt="Icon 72x72">
            <p>72x72</p>
        </div>
        <div class="icon-item">
            <img src="/icons/icon-96x96.png" alt="Icon 96x96">
            <p>96x96</p>
        </div>
        <div class="icon-item">
            <img src="/icons/icon-128x128.png" alt="Icon 128x128">
            <p>128x128</p>
        </div>
        <div class="icon-item">
            <img src="/icons/icon-144x144.png" alt="Icon 144x144">
            <p>144x144</p>
        </div>
        <div class="icon-item">
            <img src="/icons/icon-152x152.png" alt="Icon 152x152">
            <p>152x152</p>
        </div>
        <div class="icon-item">
            <img src="/icons/icon-192x192.png" alt="Icon 192x192">
            <p>192x192</p>
        </div>
        <div class="icon-item">
            <img src="/icons/icon-384x384.png" alt="Icon 384x384">
            <p>384x384</p>
        </div>
        <div class="icon-item">
            <img src="/icons/icon-512x512.png" alt="Icon 512x512">
            <p>512x512</p>
        </div>
    </div>
</body>
</html>
