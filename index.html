    <!-- Critical CSS -->
    <style>
        /* Base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--primary-light);
            color: var(--text-primary);
        }

        /* Header styles */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .logo {
            color: var(--accent-green);
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .connect-wallet {
            background: transparent;
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .connect-wallet:hover {
            background: rgba(100, 255, 218, 0.1);
            transform: translateY(-1px);
        }

        /* Main content styles */
        .main-container {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: #1a1a1a;
        }

        /* Search bar */
        .search-bar-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto 2rem;
        }

        .search-bar {
            width: 100%;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.6);
            color: var(--text-primary);
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--accent-green);
            box-shadow: 0 0 20px rgba(100, 255, 218, 0.1);
        }

        .search-bar::placeholder {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
        }

        /* Suggestion Bars */
        .suggestion-bars {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            width: 100%;
            max-width: 700px;
            margin: 1rem auto;
        }

        .service-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .service-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(100, 255, 218, 0.1);
            border-radius: 50%;
            color: var(--accent-green);
        }

        .service-content {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .service-text {
            color: var(--primary-light);
            font-size: 1.1rem;
            font-weight: 500;
        }

        .service-hours {
            color: var(--accent-green);
            font-weight: 500;
        }

        /* Search Suggestions Dropdown */
        .search-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            margin-top: 0.5rem;
            padding: 0.5rem 0;
            display: none;
            z-index: 1000;
        }

        .search-suggestion-item {
            padding: 0.8rem 1rem;
            color: var(--primary-light);
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-suggestion-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Validated Skills section */
        .validated-skills {
            margin-bottom: 2rem;
        }

        .skills-list {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .skill-tag {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: #f0f0f0;
            border-radius: 20px;
        }

        .skill-tag .count {
            color: #666;
            font-size: 0.9rem;
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .action-button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Service cards */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .service-card {
            background: var(--secondary);
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(100, 255, 218, 0.1);
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .service-card:hover::before {
            opacity: 1;
        }

        .service-card h3 {
            margin-bottom: 1rem;
        }

        .service-details {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 0.5rem;
            color: #666;
        }

        .learn-more {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 0.8rem;
            border-radius: 5px;
            width: 100%;
            margin-top: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .learn-more:hover {
            background: rgba(100, 255, 218, 0.1);
            transform: translateY(-1px);
        }

        /* Add Stats Dashboard */
        .stats-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--secondary);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid rgba(100, 255, 218, 0.1);
        }
        
        .stat-card h4 {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        .stat-value {
            color: var(--accent);
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* Enhanced UI Styles */
        :root {
            --primary-dark: #000000;
            --primary-light: #ffffff;
            --accent-blue: #0066cc;
            --accent-green: #64FFDA;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --gradient-dark: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.6) 100%);
            --primary: #0A192F;
            --secondary: #112240;
            --accent: #64FFDA;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --header-height: 76px;
            --max-width: 1200px;
            --card-radius: 12px;
            --transition-speed: 0.3s;
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .service-card {
            animation: fadeIn 0.3s ease-out;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 12px rgba(100, 255, 218, 0.1);
        }
        
        /* Trust Score Indicator */
        .trust-score {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .trust-score-bar {
            height: 4px;
            background: var(--secondary);
            border-radius: 2px;
            overflow: hidden;
            flex-grow: 1;
        }
        
        .trust-score-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        /* Responsive design improvements */
        @media (max-width: 768px) {
            .main-container {
                padding: 1rem;
            }
            
            .services-grid {
                grid-template-columns: 1fr;
            }
            
            .header {
                padding: 1rem;
                height: var(--header-height);
            }

            .header-actions {
                gap: 0.5rem;
            }

            .trust-score {
                display: none;
            }

            .tagline {
                font-size: 1.5rem;
                padding: 0 1rem;
                margin: 1rem 0;
            }

            .search-bar-container {
                padding: 0 1rem;
                margin: 1rem auto;
            }

            .service-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
                padding: 1.2rem;
            }

            .service-hours {
                align-self: flex-end;
                margin-top: 0.5rem;
            }

            .connect-wallet {
                font-size: 0.8rem;
                padding: 0.5rem 1rem;
                min-height: 44px;
            }

            .hero {
                height: calc(100vh - var(--header-height));
            }
        }

        /* Improved Touch Areas */
        @media (hover: none) {
            .service-card {
                padding: 1.2rem;
                min-height: 80px;
                cursor: pointer;
                -webkit-tap-highlight-color: transparent;
            }

            .connect-wallet {
                min-height: 44px;
                -webkit-tap-highlight-color: transparent;
            }

            .search-bar {
                min-height: 50px;
                font-size: 16px; /* Prevent iOS zoom */
            }

            /* Add touch feedback */
            .service-card:active {
                transform: scale(0.98);
                background: rgba(255, 255, 255, 0.12);
            }
        }

        /* Prevent Text Overflow */
        .service-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: calc(100% - 60px);
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
        }

        /* Modern Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: calc(var(--header-height) + 2rem);
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, 
                rgba(10, 25, 47, 0.95) 0%,
                rgba(10, 25, 47, 0.85) 100%
            );
        }

        .hero-content {
            text-align: center;
            z-index: 2;
            max-width: 1200px;
            padding: 0 2rem;
        }

        .hero-title {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 700;
            color: var(--primary-light);
            margin-bottom: 1.5rem;
            line-height: 1.1;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s ease forwards;
        }

        .hero-subtitle {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 500;
            color: var(--accent-green);
            margin-bottom: 3rem;
            line-height: 1.4;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s ease forwards 0.3s;
        }

        /* Animation Container Optimization */
        .ai-animation-container {
            position: relative;
            width: 100%;
            height: 60vh;
            margin-top: 2rem;
            opacity: 0;
            animation: fadeIn 1.5s ease forwards 0.6s;
        }

        /* Animation Keyframes */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .hero {
                padding-top: calc(var(--header-height) + 1rem);
            }

            .hero-content {
                padding: 0 1rem;
            }

            .ai-animation-container {
                height: 40vh;
            }
        }

        /* Modern Card Design */
        .service-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            transition: all 0.4s ease;
        }

        .service-card:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        /* Modern Button Design */
        .button-primary {
            background: var(--accent-blue);
            color: var(--primary-light);
            padding: 18px 40px;
            border-radius: 30px;
            border: none;
            font-size: 17px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .button-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 102, 204, 0.2);
        }

        /* Provider Info Styles */
        .provider-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .provider-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .provider-name {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .provider-rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stars {
            color: #ffd700;
            letter-spacing: -1px;
        }

        .rating-count {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .service-description {
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.5;
            margin: 1rem 0;
        }

        /* Welcome Section */
        .welcome-section {
            padding: 4rem 2rem;
            background: var(--primary-dark);
            color: var(--primary-light);
        }

        /* Tagline Animation */
        .tagline-container {
            position: relative;
            text-align: center;
            margin: 2rem auto;
            max-width: 800px;
            padding: 0 2rem;
        }

        .tagline {
            font-size: 2rem;
            font-weight: 500;
            color: var(--primary-light);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s ease forwards;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            line-height: 1.4;
        }

        .tagline span {
            color: var(--accent-green);
            position: relative;
        }

        .tagline span::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-green);
            transform: scaleX(0);
            transform-origin: right;
            animation: lineReveal 0.8s ease forwards 1s;
        }

        @keyframes lineReveal {
            from {
                transform: scaleX(0);
            }
            to {
                transform: scaleX(1);
            }
        }

        /* Tablet Optimization */
        @media (min-width: 769px) and (max-width: 1024px) {
            .tagline {
                font-size: 1.8rem;
            }

            .service-card {
                padding: 1.5rem;
            }

            .search-bar-container {
                max-width: 90%;
            }
        }

        /* Loading States */
        .loading {
            position: relative;
            overflow: hidden;
        }

        .loading::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }

        /* Performance Optimizations */
        .service-card {
            will-change: transform;
            backface-visibility: hidden;
            transform: translateZ(0);
        }

        .ai-animation-container {
            will-change: transform;
            transform: translateZ(0);
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--primary-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }

        .loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid transparent;
            border-top-color: var(--accent-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <div id="app">
        <!-- Header Component -->
        <header class="header">
            <div class="logo interactive-button">
                <span class="logo-text">HUMAN HOURS</span>
                <div class="logo-glow"></div>
            </div>
            
            <nav class="main-nav">
                <a href="/dao" class="nav-link interactive-button">
                    <i class="ph ph-buildings"></i>
                    DAO
                    <span class="nav-link-highlight"></span>
                </a>
                <a href="/messages" class="nav-link interactive-button">
                    <i class="ph ph-chat-circle"></i>
                    Messages
                    <span class="nav-link-highlight"></span>
                </a>
                <a href="/community" class="nav-link interactive-button">
                    <i class="ph ph-users"></i>
                    Community
                    <span class="nav-link-highlight"></span>
                </a>
            </nav>

            <button class="connect-wallet interactive-button">
                <i class="ph ph-wallet"></i>

            </button>
        </header>

        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-content">
                <h1 class="hero-title">Human Hours</h1>
                <h2 class="hero-subtitle">
                    The Economy of Time. Trade skills,<br>
                    earn hours, build trust.
                </h2>
            </div>

            <div class="ai-animation-container">
                <div class="loading-indicator">
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                </div>
            </div>
        </section>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 py-8">
            <!-- Search Bar -->
            <div class="search-bar-container">
                <input type="text" class="search-bar" placeholder="What do you want to do today?">
                <div class="search-suggestions"></div>
            </div>

            <!-- Service List (populated by Supabase) -->
            <div class="service-list"></div>
        </main>

    <!-- Initialize Supabase -->
    <script>
        const supabaseUrl = 'YOUR_SUPABASE_URL';
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Search human tasks
        async function searchHumanTasks(query) {
            try {
                const { data: tasks, error } = await supabase
                    .from('human_tasks')
                    .select(`
                        *,
                        creator:profiles(full_name)
                    `)
                    .textSearch('required_skills', query)
                    .eq('status', 'open')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const serviceList = document.querySelector('.service-list');
                serviceList.innerHTML = tasks.map(task => `
                    <div class="service-card">
                        <div class="service-content">
                            <div class="service-info">
                                <h3 class="service-title">${task.title}</h3>
                                <p class="service-description">${task.description}</p>
                                <div class="service-skills">
                                    ${task.required_skills.map(skill => 
                                        `<span class="skill-tag">${skill}</span>`
                                    ).join('')}
                                </div>
                                <p class="service-creator">Posted by: ${task.creator.full_name}</p>
                            </div>
                        </div>
                        <div class="service-hours">${task.hours_offered} HH</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error searching tasks:', error);
            }
        }

        // Initialize search
        document.querySelector('.search-bar').addEventListener('input', (e) => {
            if (e.target.value) {
                searchHumanTasks(e.target.value);
            }
        });
    </script>

    <!-- Initialize Web3 -->
    <script>
        // User Profile States
        const userStates = {
            DISCONNECTED: 'disconnected',
            CONNECTED: 'connected',
            PROFILE_NEEDED: 'profile_needed',
            VALIDATING: 'validating',
            VALIDATED: 'validated'
        };

        let currentUserState = userStates.DISCONNECTED;

        document.addEventListener('DOMContentLoaded', () => {
            const connectButton = document.querySelector('.connect-wallet');
            const profileModal = document.getElementById('profile-modal');

            if (connectButton) {
                connectButton.addEventListener('click', async () => {
                    try {
                        const account = await web3Service.connectWallet();
                        if (account) {
                            // Check if user exists in Supabase
                            const { data: profile } = await supabase
                                .from('profiles')
                                .select('*')
                                .eq('wallet_address', account)
                                .single();

                            if (!profile) {
                                currentUserState = userStates.PROFILE_NEEDED;
                                showProfileModal();
                            } else if (!profile.validated) {
                                currentUserState = userStates.VALIDATING;
                                showValidationPending();
                            } else {
                                currentUserState = userStates.VALIDATED;
                                showValidatedUI(profile);
                            }

                            const balance = await web3Service.getBalance();
                            connectButton.innerHTML = `
                                <i class="ph ph-wallet"></i>
                                <span class="wallet-address">${account.slice(0, 6)}...${account.slice(-4)}</span>
                                <span class="balance">(${balance} HH)</span>
                                <div class="connection-indicator"></div>
                            `;
                            connectButton.classList.add('connected');
                        }
                    } catch (error) {
                        console.error('Failed to connect wallet:', error);
                    }
                });
            }
        });

        // Profile Creation Modal
        function showProfileModal() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>Complete Your Profile</h2>
                    <form id="profile-form">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" name="full_name" required>
                        </div>
                        <div class="form-group">
                            <label>Skills (comma separated)</label>
                            <input type="text" name="skills" required>
                        </div>
                        <div class="form-group">
                            <label>Bio</label>
                            <textarea name="bio" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">Create Profile</button>
                    </form>
                </div>
            `;
            document.body.appendChild(modal);

            document.getElementById('profile-form').addEventListener('submit', handleProfileSubmit);
        }

        // Handle Profile Creation
        async function handleProfileSubmit(e) {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);

            try {
                const { data, error } = await supabase
                    .from('profiles')
                    .insert([
                        {
                            wallet_address: web3Service.getCurrentAccount(),
                            full_name: formData.get('full_name'),
                            skills: formData.get('skills').split(',').map(s => s.trim()),
                            bio: formData.get('bio'),
                            validated: false
                        }
                    ]);

                if (error) throw error;
                currentUserState = userStates.VALIDATING;
                showValidationPending();
            } catch (error) {
                console.error('Error creating profile:', error);
            }
        }
    </script>
