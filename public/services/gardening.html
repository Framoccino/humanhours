<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Maintenance & Landscaping - Human Hours</title>
    <!-- Include your existing styles -->
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        /* Copy your base styles here */
        .service-hero {
            height: 400px;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)),
                        url('/images/services/gardening-hero.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .service-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .service-features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .feature-card {
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <!-- Include your header -->
    <main>
        <div class="service-hero">
            <h1>Garden Maintenance & Landscaping</h1>
        </div>
        <div class="service-content">
            <h2>Service Details</h2>
            <p>Professional garden maintenance and landscaping services...</p>
            <!-- Add more content -->
        </div>
    </main>
</body>
</html>
